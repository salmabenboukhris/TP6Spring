<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add user</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar fade-up">
    <div class="site-shell topbar-inner">
        <a class="brand" th:href="@{/}">User Manager</a>
        <a class="btn btn-outline" th:href="@{/}">Users list</a>
    </div>
</header>

<main class="form-shell">
    <section class="panel fade-up">
        <h1 class="form-title">Create user</h1>
        <p class="form-subtitle">Fill the information below to add a new user record.</p>

        <form th:action="@{/adduser}" th:object="${user}" method="post" novalidate>
            <div class="field">
                <label for="name">Full name</label>
                <input
                    id="name"
                    type="text"
                    th:field="*{name}"
                    th:classappend="${#fields.hasErrors('name')} ? 'input is-invalid' : 'input'"
                    placeholder="e.g. Sarah Johnson"
                    required>
                <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>

            <div class="field">
                <label for="email">Email address</label>
                <input
                    id="email"
                    type="email"
                    th:field="*{email}"
                    th:classappend="${#fields.hasErrors('email')} ? 'input is-invalid' : 'input'"
                    placeholder="name@company.com"
                    required>
                <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            </div>

            <div class="form-actions">
                <a class="btn btn-outline" th:href="@{/}">Cancel</a>
                <button class="btn btn-success" type="submit">Add user</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
